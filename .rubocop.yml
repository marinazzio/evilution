inherit_from: .rubocop_todo.yml

AllCops:
  TargetRubyVersion: 3.3
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - "spec/support/fixtures/**/*"
    - "vendor/**/*"

Style/ClassAndModuleChildren:
  EnforcedStyle: compact

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"
    - "evilution.gemspec"

Metrics/ClassLength:
  Max: 150

Metrics/ModuleLength:
  CountAsOne:
    - array
    - hash
    - heredoc

Metrics/MethodLength:
  Max: 20
  CountAsOne:
    - array
    - hash
    - heredoc

# target 17
Metrics/AbcSize:
  Max: 25

Metrics/CyclomaticComplexity:
  Max: 8

Metrics/PerceivedComplexity:
  Max: 8

Metrics/ParameterLists:
  Max: 8
  Exclude:
    - "lib/evilution/integration/rspec.rb"

Layout/LineLength:
  Max: 140

Naming/MethodParameterName:
  MinNameLength: 1

Lint/MissingSuper:
  Enabled: false

Lint/IneffectiveAccessModifier:
  Enabled: false

Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

Lint/FloatComparison:
  Exclude:
    - "lib/evilution/mutator/operator/float_literal.rb"

Lint/DuplicateBranch:
  Exclude:
    - "lib/evilution/mutator/operator/float_literal.rb"

Lint/UselessMethodDefinition:
  Exclude:
    - "spec/fixtures/**/*"

# Marshal.load here deserializes IPC frames over a fork pipe between the parent
# process and its own child workers. Both ends are trusted (we forked the
# children), the pipe is private to our process tree, and no external/untrusted
# input is ever placed on it. Marshal is required for speed (no per-object
# encoder) and reliability (preserves Mutation, MutationResult, and exception
# instances with backtraces — JSON/MessagePack would lose all of these).
# Intentional and permanent — not technical debt.
#
# baseline.rb uses the same parent-forked-child pipe pattern: the parent reads
# a tiny `{ passed: bool }` payload back from a child it just forked to run a
# spec file. Same trust boundary, same rationale.
Security/MarshalLoad:
  Exclude:
    - "lib/evilution/parallel/work_queue/channel/frame.rb"
    - "lib/evilution/baseline.rb"
    - "lib/evilution/isolation/fork.rb"

# eval here loads mutated source under the original __FILE__ so __dir__ and
# require_relative resolve against the real source tree. The string is never
# user-supplied — it is the original on-disk source produced by AST::SourceSurgeon
# applied to a file the user already chose to mutate. There is no trust gain
# from refusing to eval here: the same code would otherwise execute via
# `require` of the file. Intentional and permanent — not technical debt.
Security/Eval:
  Exclude:
    - "lib/evilution/integration/loading/source_evaluator.rb"


Naming/PredicateMethod:
  Enabled: false

Style/SafeNavigation:
  Enabled: false
