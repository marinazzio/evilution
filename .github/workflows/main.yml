name: Ruby

on:
  push:
    branches:
      - master

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '4.0.1'

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run tests
        run: |
          if [ "${{ env.SKIP_PARALLEL_POOL_SPEC }}" = "1" ]; then
            bundle exec rspec --exclude-pattern "spec/evilution/parallel/pool_spec.rb"
          else
            bundle exec rspec
          fi
        timeout-minutes: 5
      - name: Run rubocop
        run: bundle exec rubocop
