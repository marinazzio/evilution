name: Bundle Audit

on:
  push: {}

jobs:
  bundle-audit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby:
          - '3.4.8'
          - '4.0.1'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Perform bundle audit
        run: bundle exec bundle-audit check
