name: Bundle Audit

on:
  push: {}

jobs:
  bundle-audit:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby:
          - '3.4.9'
          - '4.0.2'

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@a30dfa457ad68707b8b910ac3a244714b61c0626 # v1.320.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Perform bundle audit
        run: bundle exec bundle-audit check
