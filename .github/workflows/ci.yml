name: Lint and Test

on:
  push: {}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test on Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.3.11'
          - '3.4.9'
          - '4.0.2'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run linter
        run: bundle exec rubocop

      - name: Run tests
        run: bundle exec rspec spec
        timeout-minutes: 5

  memory_check:
    runs-on: ubuntu-24.04
    name: Memory leak check
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@3ff19f5e2baf30647122352b96108b1fbe250c64 # v1.299.0
        with:
          ruby-version: '3.4.9'
          bundler-cache: true
      - name: Run memory check
        run: bundle exec rake memory:check
        timeout-minutes: 5
        env:
          MEMORY_CHECK_ITERATIONS: '50'
          MEMORY_CHECK_MAX_GROWTH_KB: '10240'
