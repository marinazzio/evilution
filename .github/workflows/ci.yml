name: Lint and Test

on:
  push: {}

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test on Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.3.11'
          - '3.4.9'
          - '4.0.2'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run linter
        run: bundle exec rubocop

      - name: Run tests
        run: bundle exec rspec spec
        timeout-minutes: 5

  min_prism:
    runs-on: ubuntu-latest
    name: Resolve and test against minimum prism (1.5.x)
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/Gemfile.min_prism
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          ruby-version: '3.3.11'
          bundler-cache: true
      - name: Verify prism resolved to 1.5.x
        run: |
          bundle exec ruby -rprism -e 'abort "prism is #{Prism::VERSION}, expected ~> 1.5.0" unless Gem::Requirement.new("~> 1.5.0").satisfied_by?(Gem::Version.new(Prism::VERSION))'
      - name: Run tests against minimum prism
        run: bundle exec rspec spec
        timeout-minutes: 5
