name: Benchmark

on:
  push: {}

jobs:
  memory_check:
    runs-on: ubuntu-24.04
    name: Memory leak check

    strategy:
      matrix:
        ruby:
          - '3.4.9'
          - '4.0.2'

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@0dafeac902942906541bc140009cdbf32665b601 # v1.315.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run memory check
        run: bundle exec rake memory:check
        timeout-minutes: 5
        env:
          MEMORY_CHECK_ITERATIONS: '50'
          MEMORY_CHECK_MAX_GROWTH_KB: '10240'
