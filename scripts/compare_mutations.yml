# Head-to-head mutation comparison configuration
#
# Each file entry specifies a source file and the corresponding reference tool
# subject pattern. The reference_cmd must produce JSON output with the same
# schema as `evilution util mutation --format json`:
#   [{"operator": "...", "line": N, "diff": "..."}, ...]
#
# To use: set project_root and reference_cmd for your environment.

project_root: /home/marinad/personal/vanilla-mafia
reference_cmd: ["ruby", "scripts/mutant_json_adapter", "--project-root", "/home/marinad/personal/vanilla-mafia"]
output_dir: comparison_results
files:
  - path: app/controllers/admin/news_controller.rb
    reference_target: "Admin::NewsController"
  - path: app/models/player_claim.rb
    reference_target: "PlayerClaim"
  - path: app/services/telegram/news_scorer.rb
    reference_target: "Telegram::NewsScorer"
  - path: app/validators/password_strength_validator.rb
    reference_target: "PasswordStrengthValidator"
  - path: app/policies/application_policy.rb
    reference_target: "ApplicationPolicy"
  - path: app/services/telegram/entities_formatter.rb
    reference_target: "Telegram::EntitiesFormatter"
  - path: app/services/autosave_game_protocol_service.rb
    reference_target: "AutosaveGameProtocolService"
  - path: lib/scraper/game_scraper.rb
    reference_target: "Scraper::GameScraper"
  - path: app/jobs/process_telegram_webhook_job.rb
    reference_target: "ProcessTelegramWebhookJob"
  - path: lib/telegram/export_parser.rb
    reference_target: "Telegram::ExportParser"
